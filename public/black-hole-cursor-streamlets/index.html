<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Black Hole Cursor Streamlets</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        pointer-events: none;
      }

      #fluid-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: transparent;
      }

      .controls {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="fluid-canvas" aria-hidden="true"></canvas>

    <div class="controls" aria-hidden="true">
      <input id="rimHeat" type="range" value="0.34" />
      <input id="swirl" type="range" value="2.92" />
      <input id="pull" type="range" value="0.98" />
      <input id="cursorHeat" type="range" value="1.08" />
      <input id="dissipation" type="range" value="0.984" />
      <button id="reset" type="button">Reset</button>
      <span id="status">initializing</span>
    </div>

    <script type="module" src="./fluid.js?v=old-cursor-4"></script>
  </body>
</html>
