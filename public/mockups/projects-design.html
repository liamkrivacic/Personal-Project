<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Entrance Animations</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #030405; --text: #fff3d5; --muted: #c8c5b6; --dim: #8997a0; --accent: #ffd166;
    --line: rgba(255,243,213,0.10); --line-cool: rgba(137,151,160,0.18);
    --font-display: 'Bahnschrift','Arial Narrow','Segoe UI Variable',sans-serif;
    --font-sans: 'Aptos','Segoe UI Variable','Segoe UI',sans-serif;
    --font-mono: 'Cascadia Mono','JetBrains Mono','SFMono-Regular',monospace;
    --col: 1040px;
  }
  html { scroll-behavior: auto; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }

  /* ── Replay button (floating, testing only) ── */
  .replay-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    background: rgba(3,4,5,0.9); border: 1px solid #333; color: #555;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 7px 18px; cursor: pointer; transition: all 0.15s; backdrop-filter: blur(8px);
  }
  .replay-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Centred column ── */
  .page { padding-top: 0; }
  .col { max-width: var(--col); margin: 0 auto; padding: 0 48px; }

  /* ── Heading ── */
  .page-head {
    padding: 80px 0 48px; border-bottom: 1px solid var(--line);
    display: flex; align-items: flex-end; justify-content: space-between; gap: 48px;
  }
  .page-head-left { flex: 1; min-width: 0; overflow: hidden; }
  .page-head-eye {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 20px;
  }
  .page-head-title {
    font-family: var(--font-display); font-size: clamp(52px, 7vw, 96px);
    font-weight: 300; letter-spacing: -0.04em; line-height: 0.9; color: var(--text);
    overflow: hidden;
  }
  .title-word { display: inline-block; }

  /* ── Contact block ── */
  .page-head-right {
    flex-shrink: 0;
    display: flex; flex-direction: column; gap: 10px;
    padding-bottom: 8px;
    padding-left: 36px;
    border-left: 1px solid var(--line-cool);
  }
  .contact-label {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 4px;
  }
  .contact-link {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;
    color: var(--muted); text-decoration: none; transition: color 0.15s;
  }
  .contact-link:hover { color: var(--accent); }
  .contact-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px;
    border: 1px solid var(--line-cool); border-radius: 2px;
    font-size: 10px; font-style: normal; color: var(--dim);
    flex-shrink: 0; font-family: var(--font-mono);
    transition: border-color 0.15s, color 0.15s;
  }
  .contact-link:hover .contact-icon { border-color: var(--accent); color: var(--accent); }

  /* ── Filter bar ── */
  .filter-bar { padding: 20px 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-right: 4px; }
  .filter-pill { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 13px; border: 1px solid var(--line-cool); color: var(--dim); cursor: pointer; background: none; transition: all 0.15s; }
  .filter-pill:hover { border-color: var(--text); color: var(--text); }
  .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #030405; font-weight: 700; }
  .filter-divider { width: 1px; height: 18px; background: var(--line-cool); }

  /* ── List ── */
  .list { display: flex; flex-direction: column; }
  .row-wrap { max-width: var(--col); margin: 0 auto; padding: 0 48px; width: 100%; }

  .row {
    position: relative;
    display: grid; grid-template-columns: 64px 240px 1fr;
    align-items: stretch; border-bottom: 1px solid var(--line);
    cursor: pointer; overflow: hidden; transition: background 0.25s; min-height: 200px;
  }
  .row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
  .row:hover::before { transform: scaleY(1); }
  .row:hover { background: rgba(255,209,102,0.025); }
  .row:hover .row-num { color: var(--accent); }
  .row:hover .row-cta { color: var(--accent); opacity: 1; }
  .row:hover .row-cta-arrow { transform: translateX(4px); }

  .row-num { font-family: var(--font-display); font-size: 44px; font-weight: 300; letter-spacing: -0.04em; color: rgba(137,151,160,0.20); display: flex; align-items: flex-start; padding: 28px 0 28px 0; transition: color 0.25s; line-height: 1; border-right: 1px solid var(--line); }
  .row-img-col { border-right: 1px solid var(--line); overflow: hidden; }
  .row-img-col svg { width: 100%; height: 100%; display: block; }
  .row-body { padding: 28px 0 28px 32px; display: flex; flex-direction: column; justify-content: space-between; }
  .row-top-badges { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .row-title { font-family: var(--font-display); font-size: clamp(18px,1.8vw,26px); font-weight: 400; letter-spacing: -0.02em; color: var(--text); margin-bottom: 10px; line-height: 1.05; }
  .row-signal { font-size: 13px; color: var(--muted); line-height: 1.55; max-width: 48ch; }
  .row-bottom { display: flex; align-items: flex-end; justify-content: space-between; margin-top: 16px; }
  .row-cta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); opacity: 0.45; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .row-cta-arrow { display: inline-block; transition: transform 0.2s; }

  /* badges + skills */
  .cat-badge { display: inline-block; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; padding: 3px 9px; border-radius: 2px; }
  .cat-badge.software { background: rgba(100,180,255,0.10); color: #7ec8f7; border: 1px solid rgba(100,180,255,0.18); }
  .cat-badge.hardware { background: rgba(255,180,80,0.10); color: #f7c46a; border: 1px solid rgba(255,180,80,0.18); }
  .cat-badge.robotics { background: rgba(140,255,160,0.10); color: #88e89a; border: 1px solid rgba(140,255,160,0.18); }
  .cat-badge.rf { background: rgba(200,140,255,0.10); color: #c89cf7; border: 1px solid rgba(200,140,255,0.18); }
  .ctx-badge { display: inline-block; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; padding: 3px 9px; border-radius: 2px; background: rgba(137,151,160,0.10); color: var(--dim); border: 1px solid var(--line-cool); }
  .skills-block { margin-top: 16px; }
  .skills-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .skills-group { display: flex; flex-direction: column; gap: 4px; }
  .skills-group-label { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); opacity: 0.65; }
  .skills-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .skill-pill { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border: 1px solid var(--line-cool); color: var(--dim); }
  .skill-pill.soft { border-color: rgba(255,243,213,0.08); color: rgba(200,197,182,0.6); font-style: italic; letter-spacing: 0.03em; text-transform: none; }

  /* ══════════════════════════════════════════
     ANIMATION SYSTEM
     All animated elements start hidden via
     .will-animate. Transitions are on the
     element directly so they fire on reveal.
  ══════════════════════════════════════════ */

  /* --- Drift + Blur --- */
  .will-animate {
    opacity: 0;
    filter: blur(8px);
    transform: translateY(20px);
    transition: opacity 0.9s ease, filter 0.9s ease, transform 0.9s cubic-bezier(0.16,1,0.3,1);
  }
  .will-animate.in {
    opacity: 1;
    filter: blur(0px);
    transform: translateY(0);
  }
</style>
</head>

</div>

<script>
const projects = [
  { num:'01', type:'rf', ctx:'uni', cat:'rf', catLabel:'RF / Plasma', ctxLabel:'University',
    title:'RF Plasma', signal:'Bench energy made observable. A hardware-first investigation into controlled RF energy, measurement loops, and the boundary between simulation and physical behaviour.',
    hard:['RF systems','Instrumentation','Signal analysis'], soft:['Technical writing','Problem decomposition','Research rigour'], img:'img-rf' },
  { num:'02', type:'robotics', ctx:'uni', cat:'robotics', catLabel:'Robotics', ctxLabel:'University',
    title:'Sumobot', signal:'Small robot, hard real-time instincts. Built around fast sensing, decisive control logic, and physical design that survives contact with the arena.',
    hard:['Embedded C','Motor control','PCB design'], soft:['Iterative design','Systems thinking','Rapid prototyping'], img:'img-sumo' },
  { num:'03', type:'software', ctx:'work', cat:'software', catLabel:'Software', ctxLabel:'Work',
    title:'FMCG Web', signal:'Operational data without the spreadsheet gravity well. A web workflow shaped around interruption and speed — readable when people are moving quickly.',
    hard:['Next.js','TypeScript','UI / UX'], soft:['Client comms','Requirement gathering','Product thinking'], img:'img-fmcg' },
  { num:'04', type:'hardware', ctx:'uni', cat:'hardware', catLabel:'Hardware', ctxLabel:'University',
    title:'Lab Demo', signal:'Reliable demos for fragile physical systems. Infrastructure shaped around repeatability: wiring, setup, docs, and recovery paths.',
    hard:['Electronics','Schematic design','Test flow'], soft:['Teaching','Knowledge transfer','Process design'], img:'img-lab' },
];

function buildList() {
  document.getElementById('main-list').innerHTML = projects.map(p => {
    const h = p.hard.map(s=>`<span class="skill-pill hard">${s}</span>`).join('');
    const s = p.soft.map(s=>`<span class="skill-pill soft">${s}</span>`).join('');
    return `<div class="row-wrap" data-type="${p.type}" data-ctx="${p.ctx}">
      <div class="row">
        <span class="row-num">${p.num}</span>
        <div class="row-img-col"><svg width="100%" height="100%" viewBox="0 0 280 148" preserveAspectRatio="xMidYMid slice"><use href="#${p.img}"/></svg></div>
        <div class="row-body">
          <div>
            <div class="row-top-badges"><span class="cat-badge ${p.cat}">${p.catLabel}</span><span class="ctx-badge">${p.ctxLabel}</span></div>
            <h2 class="row-title">${p.title}</h2>
            <p class="row-signal">${p.signal}</p>
            <div class="skills-block"><div class="skills-row">
              <div class="skills-group"><span class="skills-group-label">Hard skills</span><div class="skills-pills">${h}</div></div>
              <div class="skills-group"><span class="skills-group-label">Soft skills</span><div class="skills-pills">${s}</div></div>
            </div></div>
          </div>
          <div class="row-bottom"><span></span><span class="row-cta">View case study <span class="row-cta-arrow">→</span></span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function splitTitle() {
  const el = document.getElementById('main-title');
  el.innerHTML = el.textContent.trim().split(/\s+/)
    .map((w, i) => `<span class="title-word" style="--wi:${i}">${w}&nbsp;</span>`).join('');
}

// IntersectionObserver — only animates when scrolling DOWN into a row.
// Rows that scroll off the top stay visible; rows below the fold reset and re-animate.
let io;
function setupIO(rowsToWatch) {
  if (io) io.disconnect();
  io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
      } else {
        // only reset if element is below the viewport (top edge > 0)
        // if it scrolled off the top (top < 0), keep it visible
        if (e.boundingClientRect.top > 0) {
          e.target.classList.remove('in');
        }
      }
    });
  }, { threshold: 0.06, rootMargin: '0px 0px -32px 0px' });
  rowsToWatch.forEach(el => io.observe(el));
}

function getAllAnimated() {
  return [
    document.getElementById('eyebrow'),
    document.getElementById('contact-block'),
    ...document.querySelectorAll('.title-word'),
    document.getElementById('filter-bar'),
    ...document.querySelectorAll('.row-wrap'),
  ];
}

// ── Filter logic ──
const activeFilters = { type: 'all', ctx: 'all' };

function setFilter(dim, val, btn) {
  activeFilters[dim] = val;
  // update active pill in this group only
  btn.closest('.filter-group').querySelectorAll('.filter-pill')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('.row-wrap').forEach((wrap, i) => {
    const typeOk = activeFilters.type === 'all' || wrap.dataset.type === activeFilters.type;
    const ctxOk  = activeFilters.ctx  === 'all' || wrap.dataset.ctx  === activeFilters.ctx;
    if (typeOk && ctxOk) {
      wrap.style.display = '';
      // reset then stagger back in
      wrap.classList.remove('in');
      void wrap.offsetHeight;
      setTimeout(() => wrap.classList.add('in'), i * 80);
    } else {
      wrap.style.display = 'none';
      wrap.classList.remove('in');
    }
  });
}

function replay() {
  window.scrollTo({ top: 0 });

  const all = getAllAnimated();

  // 1. strip .in and mark as will-animate
  all.forEach(el => {
    el.classList.remove('in');
    el.classList.add('will-animate');
  });

  // 2. force a full reflow so the browser registers the hidden state
  //    before any transition can fire
  void document.body.offsetHeight;

  // 3. now schedule reveals with staggered delays
  const eye    = document.getElementById('eyebrow');
  const words  = [...document.querySelectorAll('.title-word')];
  const filter = document.getElementById('filter-bar');
  const rows   = [...document.querySelectorAll('.row-wrap')];

  const contact = document.getElementById('contact-block');

  setTimeout(() => eye.classList.add('in'), 280);
  words.forEach((w, i) => setTimeout(() => w.classList.add('in'), 400 + i * 100));
  setTimeout(() => contact.classList.add('in'), 520);
  setTimeout(() => filter.classList.add('in'), 640);

  // split rows: in-viewport get staggered timeouts, off-screen go straight to the IO
  const onScreen  = rows.filter(r => r.getBoundingClientRect().top < window.innerHeight + 40);
  const offScreen = rows.filter(r => r.getBoundingClientRect().top >= window.innerHeight + 40);

  // observe only off-screen rows for now — prevents IO racing the on-screen stagger
  setupIO(offScreen);

  onScreen.forEach((row, i) => {
    setTimeout(() => {
      row.classList.add('in');
      // hand off to the observer after entrance so re-animation works on scroll
      io.observe(row);
    }, 760 + i * 130);
  });
}

buildList();
splitTitle();
// tiny delay so CSS has loaded and .will-animate initial state is active
setTimeout(replay, 60);
</script>
</body>
</html>
